

services:
  postgres-db:
    image: postgres:18.4
    container_name: ken-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testK
    volumes:
      - ken-postgres-vol:/var/lib/postgresql

volumes:
  ken-postgres-vol: